name: Type Check

on:
  push:
    branches: ['main']
  pull_request:
    # The branches below must be a subset of the branches above
    branches: ['main']
jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
      - run: npm ci
      - run: npx tsc --noEmit

      - name: Notify vercel (type check)
        uses: 'vercel/repository-dispatch/actions/status@v1'
        with:
          # The name must match the name of the Vercel Deployment Check
          name: 'Vercel - fem-invoice-app: Type Check'
